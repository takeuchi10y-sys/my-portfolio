version: "3.8"

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: portfolio-postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Qx7mK2vP9nJ4wR8t
      POSTGRES_DB: portfolio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-network

  backend-api:
    image: node:18-alpine
    container_name: portfolio-backend-api
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://admin:Qx7mK2vP9nJ4wR8t@postgres-db:5432/portfolio_db?schema=public
    depends_on:
      - postgres-db
    networks:
      - portfolio-network

volumes:
  postgres_data:

networks:
  portfolio-network:
    driver: bridge
